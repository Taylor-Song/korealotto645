name: Update Korea Lotto Data

on:
  schedule:
    # Saturday 21:00 KST = Saturday 12:00 UTC
    - cron: '0 12 * * 6'
    # Saturday 21:30 KST = Saturday 12:30 UTC
    - cron: '30 12 * * 6'
    # Saturday 22:30 KST = Saturday 13:30 UTC
    - cron: '30 13 * * 6'
    # Sunday 00:30 KST = Saturday 15:30 UTC
    - cron: '30 15 * * 6'
    # Sunday 09:00 KST = Sunday 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-lotto:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run update script
        run: python scripts/update_korea_lotto.py

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/draws_delta.json
          git status
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Korea Lotto draw data"
            git push
          fi
